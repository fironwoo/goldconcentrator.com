<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Chrome ore washing and gravity separation process illustration</title>
  <desc id="desc">A simplified chrome ore process route with washing, desliming, classification, spiral concentration, cleaning and dewatering.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#191a19"/>
      <stop offset="1" stop-color="#2f302d"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d39a38"/>
    </marker>
    <style>
      .title{font:700 34px Arial,sans-serif;fill:#fffdf8}
      .light{font:15px Arial,sans-serif;fill:#e9e1d3}
      .label{font:700 20px Arial,sans-serif;fill:#191a19}
      .small{font:15px Arial,sans-serif;fill:#565852}
      .note{font:14px Arial,sans-serif;fill:#efc56d}
      .box{fill:#fffdf8;stroke:#d39a38;stroke-width:3}
      .dark{fill:#2f302d;stroke:#d39a38;stroke-width:3}
      .line{fill:none;stroke:#d39a38;stroke-width:4;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="76" class="title">Chrome Ore Process Logic</text>
  <text x="70" y="108" class="light">Product quality depends on desliming, size control and staged spiral concentration.</text>

  <rect x="70" y="185" width="150" height="86" rx="12" class="box"/>
  <text x="96" y="220" class="label">Wash</text>
  <text x="96" y="247" class="small">scrub clay</text>

  <rect x="265" y="185" width="150" height="86" rx="12" class="box"/>
  <text x="291" y="220" class="label">Deslime</text>
  <text x="291" y="247" class="small">remove ultrafines</text>

  <rect x="460" y="185" width="150" height="86" rx="12" class="box"/>
  <text x="486" y="220" class="label">Classify</text>
  <text x="486" y="247" class="small">stable feed size</text>

  <rect x="655" y="185" width="170" height="86" rx="12" class="dark"/>
  <text x="682" y="220" font="700 20px Arial" fill="#fffdf8">Spiral Rougher</text>
  <text x="682" y="247" class="light">mass pull control</text>

  <rect x="870" y="185" width="145" height="86" rx="12" class="dark"/>
  <text x="898" y="220" font="700 20px Arial" fill="#fffdf8">Clean</text>
  <text x="898" y="247" class="light">spiral / table</text>

  <rect x="1060" y="185" width="95" height="86" rx="12" class="box"/>
  <text x="1077" y="220" class="label">Dewater</text>
  <text x="1077" y="247" class="small">handle</text>

  <path d="M220 228 H260" class="line"/>
  <path d="M415 228 H455" class="line"/>
  <path d="M610 228 H650" class="line"/>
  <path d="M825 228 H865" class="line"/>
  <path d="M1015 228 H1055" class="line"/>

  <rect x="260" y="455" width="680" height="82" rx="18" fill="#222321" stroke="#8a4c20" stroke-width="2"/>
  <text x="298" y="493" class="note">Design checks</text>
  <text x="298" y="522" class="light">feed grade | Cr2O3 target | liberation | slime content | water balance | tailings retreatment potential</text>
  <text x="70" y="620" class="note">Process illustration only. Buyer specification and test response control the final route.</text>
</svg>
