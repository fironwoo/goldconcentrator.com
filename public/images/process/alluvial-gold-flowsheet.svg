<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Alluvial gold washing, sizing and gravity recovery flowsheet</title>
  <desc id="desc">Engineering-style alluvial gold flowsheet showing feed control, washing, screening, staged gravity recovery, concentrate cleaning, tailings and design checks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#191a19"/>
      <stop offset="1" stop-color="#332b21"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#d39a38"/>
    </marker>
    <style>
      .title{font:700 34px Arial,sans-serif;fill:#fffdf8}
      .subtitle{font:16px Arial,sans-serif;fill:#e9e1d3}
      .label{font:700 17px Arial,sans-serif;fill:#fffdf8}
      .small{font:13px Arial,sans-serif;fill:#d8cfbf}
      .stream-label{font:700 12px Arial,sans-serif;fill:#efc56d;letter-spacing:.04em;text-transform:uppercase}
      .note{font:13px Arial,sans-serif;fill:#efc56d}
      .panel{fill:#242522;stroke:#5f5649;stroke-width:1.5}
      .machine{fill:#fffdf8;stroke:#d39a38;stroke-width:2.5}
      .machine-dark{fill:#2f302d;stroke:#d39a38;stroke-width:2.5}
      .line{fill:none;stroke:#d39a38;stroke-width:4;marker-end:url(#arrow)}
      .water{fill:none;stroke:#7fb5c9;stroke-width:3;stroke-dasharray:9 8;marker-end:url(#arrow)}
      .tail{fill:none;stroke:#a68d6d;stroke-width:3;stroke-dasharray:7 7;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="58" y="62" class="title">Alluvial Gold Flowsheet</text>
  <text x="58" y="92" class="subtitle">Wash first. Split by size. Recover coarse and fine gold on separate gravity duties.</text>
  <text x="58" y="122" class="note">Process illustration only. Final equipment selection requires representative material testing.</text>

  <rect x="58" y="166" width="155" height="145" rx="14" class="panel"/>
  <polygon points="88,202 183,202 158,244 113,244" class="machine"/>
  <rect x="104" y="244" width="62" height="25" class="machine"/>
  <text x="88" y="286" class="label">Feed control</text>
  <text x="88" y="305" class="small">hopper / grizzly</text>

  <rect x="258" y="166" width="175" height="145" rx="14" class="panel"/>
  <ellipse cx="345" cy="229" rx="72" ry="31" class="machine"/>
  <rect x="294" y="203" width="104" height="52" class="machine"/>
  <line x1="309" y1="204" x2="309" y2="255" stroke="#8a4c20" stroke-width="2"/>
  <line x1="344" y1="204" x2="344" y2="255" stroke="#8a4c20" stroke-width="2"/>
  <line x1="379" y1="204" x2="379" y2="255" stroke="#8a4c20" stroke-width="2"/>
  <text x="290" y="286" class="label">Scrub / trommel</text>
  <text x="290" y="305" class="small">clay break-up and wash</text>

  <rect x="478" y="166" width="165" height="145" rx="14" class="panel"/>
  <polygon points="506,204 618,190 626,219 514,237" class="machine"/>
  <line x1="520" y1="207" x2="530" y2="234" stroke="#8a4c20" stroke-width="2"/>
  <line x1="550" y1="202" x2="560" y2="229" stroke="#8a4c20" stroke-width="2"/>
  <line x1="580" y1="198" x2="590" y2="225" stroke="#8a4c20" stroke-width="2"/>
  <text x="508" y="286" class="label">Size screen</text>
  <text x="508" y="305" class="small">oversize and fractions</text>

  <rect x="705" y="88" width="175" height="128" rx="14" class="panel"/>
  <path d="M744 150h92v30h-92zM760 125h60v25h-60z" class="machine-dark"/>
  <circle cx="765" cy="185" r="9" fill="#d39a38"/>
  <circle cx="814" cy="185" r="9" fill="#d39a38"/>
  <text x="735" y="116" class="label">Coarse gravity</text>
  <text x="735" y="205" class="small">jig / sluice duty</text>

  <rect x="705" y="285" width="175" height="128" rx="14" class="panel"/>
  <circle cx="790" cy="344" r="38" class="machine-dark"/>
  <circle cx="790" cy="344" r="20" fill="none" stroke="#d39a38" stroke-width="3"/>
  <rect x="749" y="382" width="82" height="13" class="machine-dark"/>
  <text x="735" y="313" class="label">Fine gravity</text>
  <text x="735" y="402" class="small">centrifugal route</text>

  <rect x="940" y="188" width="160" height="145" rx="14" class="panel"/>
  <polygon points="967,250 1076,238 1084,258 975,273" class="machine"/>
  <line x1="988" y1="247" x2="996" y2="270" stroke="#8a4c20" stroke-width="2"/>
  <line x1="1026" y1="243" x2="1034" y2="266" stroke="#8a4c20" stroke-width="2"/>
  <text x="970" y="216" class="label">Concentrate</text>
  <text x="970" y="312" class="small">table cleaning / upgrade</text>

  <path d="M213 238H253" class="line"/>
  <path d="M433 238H473" class="line"/>
  <path d="M643 238C686 238 674 151 700 151" class="line"/>
  <path d="M643 238C686 238 674 346 700 346" class="line"/>
  <path d="M880 151C920 151 912 248 935 248" class="line"/>
  <path d="M880 346C920 346 912 264 935 264" class="line"/>

  <path d="M620 274C665 310 664 435 760 448" class="tail"/>
  <text x="610" y="356" class="stream-label">Oversize / barren tailings</text>
  <path d="M1100 260C1138 260 1138 410 1060 438" class="line"/>
  <text x="1020" y="455" class="stream-label">Clean gold concentrate</text>
  <path d="M880 392C940 448 952 492 1040 512" class="tail"/>
  <text x="870" y="482" class="stream-label">Tailings to settling</text>
  <path d="M1018 512C940 552 388 552 345 314" class="water"/>
  <text x="490" y="575" class="stream-label">Process water recycle where site conditions allow</text>

  <rect x="58" y="455" width="420" height="118" rx="16" fill="#111210" stroke="#8a4c20" stroke-width="2"/>
  <text x="86" y="488" class="label">Design checks</text>
  <text x="86" y="518" class="small">Clay retention time | gold particle size | boulder control</text>
  <text x="86" y="544" class="small">Water balance | screen cut size | tails sampling points</text>
</svg>
